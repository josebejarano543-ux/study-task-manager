<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A simple study task manager built with JavaScript.">
  <title>Study Task Manager</title>
  <link rel="stylesheet" href="styles.css">

  <!-- External JavaScript library required by the module -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <p class="eyebrow">CSE 310 • JavaScript Module</p>
      <h1>Study Task Manager</h1>
      <p class="subtitle">
        Organize assignments, track progress, and stay focused.
      </p>
    </header>

    <section class="panel" aria-labelledby="task-form-title">
      <h2 id="task-form-title">Add a study task</h2>

      <form id="task-form" class="task-form">
        <div class="field field-wide">
          <label for="task-title">Task name</label>
          <input
            id="task-title"
            name="task-title"
            type="text"
            maxlength="80"
            placeholder="Example: Finish JavaScript assignment"
            required
          >
        </div>

        <div class="field">
          <label for="task-course">Course</label>
          <input
            id="task-course"
            name="task-course"
            type="text"
            maxlength="40"
            placeholder="Example: CSE 310"
          >
        </div>

        <div class="field">
          <label for="task-date">Due date</label>
          <input id="task-date" name="task-date" type="date" required>
        </div>

        <div class="field">
          <label for="task-priority">Priority</label>
          <select id="task-priority" name="task-priority">
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <button class="primary-button" type="submit">Add task</button>
      </form>

      <p id="form-message" class="form-message" aria-live="polite"></p>
    </section>

    <section class="summary-grid" aria-label="Task summary">
      <article class="summary-card">
        <span>Total</span>
        <strong id="total-count">0</strong>
      </article>

      <article class="summary-card">
        <span>Pending</span>
        <strong id="pending-count">0</strong>
      </article>

      <article class="summary-card">
        <span>Completed</span>
        <strong id="completed-count">0</strong>
      </article>
    </section>

    <section class="panel" aria-labelledby="task-list-title">
      <div class="list-heading">
        <div>
          <h2 id="task-list-title">My tasks</h2>
          <p id="task-list-description">Showing all tasks</p>
        </div>

        <div class="filters" aria-label="Task filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="pending">Pending</button>
          <button class="filter-button" type="button" data-filter="completed">Completed</button>
        </div>
      </div>

      <div id="task-list" class="task-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
